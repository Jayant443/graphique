<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphly - Lightweight Graph Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside id="side-panel">
            <header class="panel-section-header">
                <h2>Graphly</h2>
                <p>Real-time analysis</p>
            </header>

            <section id="panel-graph-details" class="panel-section">
                <div>
                    <h3>Adjacency List</h3>
                    <div class="panel-card" id="adj-list-container">
                    </div>
                </div>
                <div>
                    <h3>Adjacency Matrix</h3>
                    <div class="panel-card" style="overflow-x: auto;">
                        <table class="adj-matrix" id="adj-matrix-table">
                        </table>
                    </div>
                </div>
            </section>
        </aside>

        <main id="main-content">
            <div id="toolbar">
                <button id="btn-select" class="active" title="Select & Move (S)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7 2l12 11.2l-5.8 0.5l3.3 7.3l-2.2 1l-3.2-7.4L7 18.5V2z"/></svg>
                    <span>Select</span>
                </button>
                <button id="btn-add-node" title="Add Node (N)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                    <span>Node</span>
                </button>
                <button id="btn-add-edge" title="Add Edge (E)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16.01 11H4v2h12.01v3L20 12l-3.99-4v3z"/></svg>
                    <span>Edge</span>
                </button>
                <div class="separator contextual-sep node-name-control"></div>
                <div class="toolbar-control node-name-control">
                    <label>Node Name</label>
                    <input type="text" id="input-node-name" placeholder="New Node">
                </div>
                <div class="toolbar-control directed-control">
                    <label>Directed</label>
                    <input type="checkbox" id="check-directed" unchecked style="width: 20px; height: 20px;">
                </div>
                <div class="separator"></div>
                <div class="toolbar-control">
                    <label>Node Size</label>
                    <div class="slider-wrapper">
                        <span id="val-node-size" class="slider-value">15</span>
                        <input type="range" id="slider-node-size" min="5" max="40" value="15">
                    </div>
                </div>
                <div class="toolbar-control">
                    <label>Edge Length</label>
                    <div class="slider-wrapper">
                        <span id="val-edge-length" class="slider-value">150</span>
                        <input type="range" id="slider-edge-length" min="50" max="300" value="150">
                    </div>
                </div>
                <div class="separator"></div>
                <button id="btn-delete" class="danger" title="Delete Selected (Del)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    <span>Delete</span>
                </button>
                <button id="btn-clear" title="Clear All">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15,16h4v2h-4V16z M15,8h7v2h-7V8z M15,12h6v2h-6V12z M13,17v-7c0-1.1-0.9-2-2-2H4c-1.1,0-2,0.9-2,2v7c0,1.1,0.9,2,2,2h7 C12.1,19,13,18.1,13,17z M4,10h7v7H4V10z M14,7h-1H3V5h3V3.5C6,2.67,6.67,2,7.5,2h2C10.33,2,11,2.67,11,3.5V5h3V7z M7.5,3.5v1.5h2V3.5H7.5z"/></svg>
                    <span>Clear</span>
                </button>
            </div>
            <svg id="graph-container">
                <defs>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
                        <feOffset dx="1" dy="1" result="offsetblur" />
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.3" />
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
                    refX="20" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
                    </marker>
                    <marker id="arrowhead-selected" markerWidth="10" markerHeight="7" 
                    refX="20" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce" />
                    </marker>
                </defs>
                <g id="viewport">
                    <g id="edges-layer"></g>
                    <g id="nodes-layer"></g>
                </g>
            </svg>
            <div id="status-bar">
                Mode: <span id="current-mode">Select</span>
            </div>
        </main>
    </div>
    <script src="graph.js"></script>
    <script src="app.js"></script>
</body>
</html>
