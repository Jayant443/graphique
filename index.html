<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphly - Lightweight Graph Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <button id="btn-select" class="active" title="Select & Move (S)">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M13.13 14.54l-2.32-0.83-2.23 4.49-1.8-0.9 2.24-4.49-2.33-0.82 7.55-4.45 2.21 11.23-3.32-4.23zM20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.59-5.59L4 12l8 8 8-8z"/></svg>
                <span>Select</span>
            </button>
            <button id="btn-add-node" title="Add Node (N)">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                <span>Node</span>
            </button>
            <button id="btn-add-edge" title="Add Edge (E)">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16.01 11H4v2h12.01v3L20 12l-3.99-4v3z"/></svg>
                <span>Edge</span>
            </button>
            <div class="separator contextual-sep node-name-control"></div>
            <div class="toolbar-control node-name-control">
                <label>Node Name</label>
                <input type="text" id="input-node-name" placeholder="New Node" style="width: 120px; padding: 6px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px;">
            </div>
            <div class="separator contextual-sep directed-control"></div>
            <div class="toolbar-control directed-control">
                <label>Directed</label>
                <input type="checkbox" id="check-directed" checked style="width: 20px; height: 20px;">
            </div>
            <div class="separator"></div>
            <div class="toolbar-control">
                <label>Node Size</label>
                <input type="range" id="slider-node-size" min="5" max="40" value="15">
            </div>
            <div class="toolbar-control">
                <label>Edge Length</label>
                <input type="range" id="slider-edge-length" min="50" max="300" value="150">
            </div>
            <div class="separator"></div>
            <button id="btn-delete" class="danger" title="Delete Selected (Del)">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                <span>Delete</span>
            </button>
            <button id="btn-clear" title="Clear All">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.36 2.72L20.78 4.14L15.06 9.86L13.64 8.44L19.36 2.72M5.93 17.57C3.92 15.56 2.68 12.93 2.68 10.11C2.68 4.53 7.21 0 12.79 0C13.12 0 13.44 0.02 13.76 0.05L12.1 1.71C10.5 1.49 8.87 1.83 7.42 2.72L11.5 6.81C12.33 6.3 13.3 6 14.33 6C17.46 6 20 8.54 20 11.67C20 12.61 19.77 13.47 19.37 14.23L21.03 15.89C21.82 14.65 22.32 13.21 22.32 11.67C22.32 7.18 18.73 3.54 14.28 3.36L15.72 1.92C19.3 2.38 22.14 5.31 22.31 8.92L23.72 10.33L22.31 11.75L20.89 10.33L19.47 11.75L20.89 13.17L19.47 14.59L18.06 13.17L16.64 14.59L18.06 16.01L16.64 17.42L15.22 16L13.81 17.42L15.22 18.84L13.81 20.25L12.39 18.84L10.97 20.25L12.39 21.67L10.97 23.08L9.56 21.67L8.14 23.08L6.72 21.67L5.31 23.08L3.89 21.67L2.47 23.08L1.06 21.67L2.47 20.25L1.06 18.84L2.47 17.42L4.07 15.82C2.7 14.18 2 12.17 2 10.11C2 7.7 2.93 5.5 4.45 3.86L5.93 5.34C4.85 6.64 4.21 8.3 4.21 10.11C4.21 12.31 5.11 14.31 6.56 15.76L5.93 17.57Z"/></svg>
                <span>Clear</span>
            </button>
        </div>
        <svg id="graph-container">
            <defs>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
                    <feOffset dx="1" dy="1" result="offsetblur" />
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.3" />
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" 
                refX="20" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
                </marker>
                <marker id="arrowhead-selected" markerWidth="10" markerHeight="7" 
                refX="20" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce" />
                </marker>
            </defs>
            <g id="viewport">
                <g id="edges-layer"></g>
                <g id="nodes-layer"></g>
            </g>
        </svg>
        <div id="status-bar">
            Mode: <span id="current-mode">Select</span>
        </div>
    </div>
    <script src="graph.js"></script>
    <script src="app.js"></script>
</body>
</html>
